name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: "sage-wiki-Android"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sage-wiki-android-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  release:
    needs: [build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: sage-wiki-android-apk
          path: apk-artifacts

      - name: Extract version from gradle
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          echo "## 更新日志 (简体中文)" > release-notes.md
          echo "" >> release-notes.md
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log "$LAST_TAG"..HEAD --oneline --no-decorate >> release-notes.md 2>/dev/null
          else
            git log --oneline --no-decorate -30 >> release-notes.md 2>/dev/null
            echo "" >> release-notes.md
            echo "初始版本" >> release-notes.md
          fi

      - name: Delete old release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "v${{ env.APP_VERSION }}" --cleanup-tag --yes 2>/dev/null || true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ env.APP_VERSION }}" \
            --title "${{ env.APP_NAME }} v${{ env.APP_VERSION }}" \
            --notes-file release-notes.md \
            apk-artifacts/*.apk