name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sage-wiki-android-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  release:
    needs: [build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: sage-wiki-android-apk
          path: apk-artifacts

      - name: Generate release tag and notes
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          {
            echo "## Sage Wiki Android $VERSION"
            echo ""
            echo "### Downloads"
            ls -1 apk-artifacts/ | while read f; do echo "- \`$f\`"; done
            echo ""
            echo "### Changes"
            git log --oneline --no-decorate -20 2>/dev/null || echo "Initial release"
          } > release-notes.md
        id: version

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Sage Wiki Android ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            apk-artifacts/*.apk